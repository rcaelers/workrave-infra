# Wave 10: no dependencies on anything but the source repo itself.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardrail-resources
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/guardrail-resources/base
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
