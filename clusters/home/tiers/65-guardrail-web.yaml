---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gate-65
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/_empty
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: guardrail-api
    - name: guardrail-curator
    - name: guardrail-ingestion
    - name: guardrail-processor
    - name: guardrail-setup-pocket-id
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardrail-web
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/guardrail-web/overlays/home
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-65
