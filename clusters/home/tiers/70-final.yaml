---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gate-70
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/_empty
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: guardrail-web
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardrail-setup-surrealdb-seed
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/guardrail-setup-surrealdb-seed/overlays/home
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-70
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardrail-ui
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/guardrail-ui/overlays/home
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-70
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: surrealdb
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/surrealdb/overlays/home
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-70
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: surrealdb-helm
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/surrealdb/flux
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-70
