---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gate-40
  namespace: flux-system
spec:
  interval: 1m
  path: ./clusters/_empty
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: envoy-gateway
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: garage
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/garage/overlays/home
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: gate-40
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
