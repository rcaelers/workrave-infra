name: Update Guardrail Images

on:
  repository_dispatch:
    types: [update-dev-images, update-prod-images]
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch in workrave-infra to update
        required: true
        default: main
        type: choice
        options:
          - main
          - staging
      sha:
        description: Guardrail commit SHA for short-SHA image tags
        required: true
        type: string
      tag:
        description: Image tag to write; defaults to the short SHA when omitted
        required: false
        type: string
      services:
        description: Space-separated services to update
        required: true
        default: server schema-sync ui
        type: string

jobs:
  update-images:
    name: Update image tags
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || (github.event.action == 'update-dev-images' && 'staging' || 'main') }}
      GUARDRAIL_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.sha || github.event.client_payload.sha }}
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.client_payload.tag }}
      SERVICES: ${{ github.event_name == 'workflow_dispatch' && inputs.services || github.event.client_payload.services }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Update image tags
        run: |
          SHA="${GUARDRAIL_SHA}"
          SERVICES="${SERVICES}"
          if [[ -n "${IMAGE_TAG}" ]]; then
            TAG="${IMAGE_TAG}"
          else
            TAG="${SHA:0:7}"
          fi
          if [[ "${TARGET_BRANCH}" == "main" ]]; then
            ENV_NAME="prod"
          else
            ENV_NAME="dev"
          fi

          update_image() {
            local IMAGE="$1" TAG="$2" KUSTOMIZATION="$3"
            if [[ -f "${KUSTOMIZATION}" ]]; then
              awk -v image="${IMAGE}" -v tag="${TAG}" '
                $1 == "-" && $2 == "name:" && $3 == image {
                  print
                  getline
                  sub(/newTag: .*/, "newTag: \"" tag "\"")
                  print
                  next
                }
                { print }
              ' "${KUSTOMIZATION}" > "${KUSTOMIZATION}.tmp"
              mv "${KUSTOMIZATION}.tmp" "${KUSTOMIZATION}"
              echo "Updated ${KUSTOMIZATION} to ${TAG}"
            else
              echo "Warning: ${KUSTOMIZATION} not found, skipping"
            fi
          }

          for SERVICE in ${SERVICES}; do
            IMAGE="ghcr.io/rcaelers/guardrail-${SERVICE}"

            if [[ "${SERVICE}" == "schema-sync" ]]; then
              update_image "${IMAGE}" "${TAG}" "apps/guardrail-setup-surrealdb-schema/base/kustomization.yaml"
            elif [[ "${SERVICE}" == "server" ]]; then
              # single image, used by all five backend app deployments
              for APP in guardrail-api guardrail-curator guardrail-ingestion guardrail-processor guardrail-web; do
                update_image "${IMAGE}" "${TAG}" "apps/${APP}/base/kustomization.yaml"
              done
            else
              update_image "${IMAGE}" "${TAG}" "apps/guardrail-${SERVICE}/base/kustomization.yaml"
            fi
          done

      - name: Commit and push
        run: |
          SHA="${GUARDRAIL_SHA}"
          if [[ -n "${IMAGE_TAG}" ]]; then
            TAG="${IMAGE_TAG}"
          else
            TAG="${SHA:0:7}"
          fi
          if [[ "${TARGET_BRANCH}" == "main" ]]; then
            ENV_NAME="prod"
          else
            ENV_NAME="dev"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${ENV_NAME} images to ${TAG}"
          git push origin HEAD:${TARGET_BRANCH}
