name: Update Guardrail Images

on:
  repository_dispatch:
    types: [update-dev-images, update-prod-images]

jobs:
  update-images:
    name: Update image tags
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Update image tags
        run: |
          SHA="${{ github.event.client_payload.sha }}"
          SERVICES="${{ github.event.client_payload.services }}"
          if [[ "${{ github.event.action }}" == "update-prod-images" ]]; then
            OVERLAY="production"
            ENV_NAME="prod"
            TAG="${{ github.event.client_payload.tag }}"
          else
            OVERLAY="development"
            ENV_NAME="dev"
            TAG="${SHA:0:7}"
          fi

          update_image() {
            local IMAGE="$1" TAG="$2" KUSTOMIZATION="$3"
            if [[ -f "${KUSTOMIZATION}" ]]; then
              awk -v image="${IMAGE}" -v tag="${TAG}" '
                $1 == "-" && $2 == "name:" && $3 == image {
                  print
                  getline
                  sub(/newTag: .*/, "newTag: \"" tag "\"")
                  print
                  next
                }
                { print }
              ' "${KUSTOMIZATION}" > "${KUSTOMIZATION}.tmp"
              mv "${KUSTOMIZATION}.tmp" "${KUSTOMIZATION}"
              echo "Updated ${KUSTOMIZATION} to ${TAG}"
            else
              echo "Warning: ${KUSTOMIZATION} not found, skipping"
            fi
          }

          for SERVICE in ${SERVICES}; do
            IMAGE="ghcr.io/rcaelers/guardrail-${SERVICE}"

            if [[ "${SERVICE}" == "schema-sync" ]]; then
              # schema-sync tag lives in the api overlay alongside the server tag
              update_image "${IMAGE}" "${TAG}" "apps/guardrail-api/overlays/${OVERLAY}/kustomization.yaml"
            elif [[ "${SERVICE}" == "server" ]]; then
              # single image, used by all five backend app deployments
              for APP in guardrail-api guardrail-curator guardrail-ingestion guardrail-processor guardrail-web; do
                update_image "${IMAGE}" "${TAG}" "apps/${APP}/overlays/${OVERLAY}/kustomization.yaml"
              done
            else
              update_image "${IMAGE}" "${TAG}" "apps/guardrail-${SERVICE}/overlays/${OVERLAY}/kustomization.yaml"
            fi
          done

      - name: Commit and push
        run: |
          SHA="${{ github.event.client_payload.sha }}"
          if [[ "${{ github.event.action }}" == "update-prod-images" ]]; then
            ENV_NAME="prod"
            TAG="${{ github.event.client_payload.tag }}"
          else
            ENV_NAME="dev"
            TAG="${SHA:0:7}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ${ENV_NAME} images to ${TAG}"
          git push
