apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: envoy-gateway-system

resources:
  - envoyproxy.yaml
  - gatewayclass.yaml
  - gateway.yaml
  - http-redirect.yaml

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: v1.7.2
    releaseName: envoy-gateway
    namespace: envoy-gateway-system
    valuesFile: values.yaml
    includeCRDs: true
