apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-ingestion
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guardrail-ingestion
  template:
    metadata:
      labels:
        app: guardrail-ingestion
      annotations:
        configmap.reloader.stakater.com/reload: "guardrail-config"
        secret.reloader.stakater.com/reload: "guardrail-valkey-secrets,guardrail-object-storage-secrets"
    spec:
      serviceAccountName: guardrail-ingestion-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: guardrail-ingestion
          image: ghcr.io/rcaelers/guardrail-server:placeholder
          command: ["/app/guardrail"]
          args: ["ingestion", "-C", "/config"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
          startupProbe:
            httpGet:
              path: /api/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: accessKey
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: garage-secrets
                  key: secretKey
          volumeMounts:
            - name: config-volume
              mountPath: /config/01-ingress.yaml
              subPath: 01-ingress.yaml
            - name: config-volume
              mountPath: /config/01-object-storage.yaml
              subPath: 01-object-storage.yaml
            - name: valkey-secret-volume
              mountPath: /config/02-valkey-secret.yaml
              subPath: secrets
            - name: object-storage-secret-volume
              mountPath: /config/03-object-storage-secret.yaml
              subPath: secrets
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: guardrail-config
        - name: valkey-secret-volume
          secret:
            secretName: guardrail-valkey-secrets
        - name: object-storage-secret-volume
          secret:
            secretName: guardrail-object-storage-secrets
        - name: tmp-volume
          emptyDir: {}
