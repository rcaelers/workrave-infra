apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: guardrail-ingestion
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - http:
        paths:
          - path: /api/minidump
            pathType: Prefix
            backend:
              service:
                name: guardrail-ingestion
                port:
                  number: 80
  tls:
    - secretName: guardrail-ingestion-tls
