---
image:
  tag: v3.0.5

surrealdb:
  path: rocksdb:///data
  port: 8000
  log: trace

command:
  - /bin/sh
  - -ec
args:
  - |
    exec surreal start \
      --bind "$SURREAL_BIND" \
      --log "$SURREAL_LOG" \
      --user "$(cat /run/secrets/surrealdb/rootUser)" \
      --pass "$(cat /run/secrets/surrealdb/rootPassword)" \
      "$SURREAL_PATH"

volumes:
  - name: surrealdb-credentials
    secret:
      secretName: surrealdb-secrets

volumeMounts:
  - name: surrealdb-credentials
    mountPath: /run/secrets/surrealdb
    readOnly: true
    
podSecurityContext:
  fsGroup: 65532

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

persistence:
  enabled: true
  size: 5Gi
  mountPath: /data
  accessModes:
    - ReadWriteOnce

strategy:
  type: Recreate
