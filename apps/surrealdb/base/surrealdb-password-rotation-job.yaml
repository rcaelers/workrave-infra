apiVersion: v1
kind: ServiceAccount
metadata:
  name: surrealdb-rotation-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: surrealdb-rotation-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["surrealdb-secrets", "surrealdb-password-rotation"]
    verbs: ["get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: ["isindir.github.com"]
    resources: ["sopssecrets"]
    resourceNames: ["surrealdb-sop-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: surrealdb-rotation-rolebinding
subjects:
  - kind: ServiceAccount
    name: surrealdb-rotation-sa
roleRef:
  kind: Role
  name: surrealdb-rotation-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: surrealdb-password-snapshot
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: surrealdb-password-rotation
    spec:
      serviceAccountName: surrealdb-rotation-sa
      restartPolicy: OnFailure
      containers:
        - name: snapshot
          image: alpine/k8s:1.32.4
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if kubectl get secret surrealdb-password-rotation -n surrealdb >/dev/null 2>&1; then
                echo "Existing SurrealDB password rotation snapshot found; keeping it for retry"
                exit 0
              fi

              old_secret=$(
                kubectl get secret surrealdb-secrets -n surrealdb \
                  -o jsonpath='{.metadata.resourceVersion}{" "}{.data.rootPassword}' 2>/dev/null || true
              )
              old_resource_version=${old_secret%% *}
              old_password_b64=${old_secret#* }
              if [ -z "$old_password_b64" ]; then
                echo "No existing SurrealDB root password found; first install does not need rotation"
                exit 0
              fi

              old_password=$(printf '%s' "$old_password_b64" | base64 -d)
              kubectl create secret generic surrealdb-password-rotation \
                --namespace surrealdb \
                --from-literal=oldPassword="${old_password}" \
                --from-literal=oldResourceVersion="${old_resource_version}" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "SurrealDB root password snapshot created"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: surrealdb-password-rotation
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: surrealdb-password-rotation
    spec:
      serviceAccountName: surrealdb-rotation-sa
      restartPolicy: OnFailure
      containers:
        - name: rotate
          image: alpine/k8s:1.32.4
          env:
            - name: OLD_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-password-rotation
                  key: oldPassword
                  optional: true
            - name: OLD_RESOURCE_VERSION
              valueFrom:
                secretKeyRef:
                  name: surrealdb-password-rotation
                  key: oldResourceVersion
                  optional: true
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootUser
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              i=0
              until curl -fsS http://surrealdb.surrealdb:8000/health >/dev/null 2>&1; do
                i=$((i + 1))
                if [ "$i" -ge 60 ]; then echo "Timeout waiting for SurrealDB"; exit 1; fi
                sleep 2
              done

              read_new_password() {
                local current_resource_version current_rotation_id desired_rotation_id password_b64
                desired_rotation_id=$(
                  kubectl get sopssecret surrealdb-sop-secrets -n surrealdb \
                    -o jsonpath='{.spec.secretTemplates[0].annotations.rotationid}' 2>/dev/null || true
                )

                i=0
                while true; do
                  if [ -n "$desired_rotation_id" ]; then
                    current_rotation_id=$(
                      kubectl get secret surrealdb-secrets -n surrealdb \
                        -o jsonpath='{.metadata.annotations.rotationid}' 2>/dev/null || true
                    )
                    if [ "$current_rotation_id" = "$desired_rotation_id" ]; then
                      break
                    fi
                  else
                    current_resource_version=$(
                      kubectl get secret surrealdb-secrets -n surrealdb \
                        -o jsonpath='{.metadata.resourceVersion}'
                    )
                    if [ -z "${OLD_RESOURCE_VERSION:-}" ] || [ "$current_resource_version" != "$OLD_RESOURCE_VERSION" ]; then
                      break
                    fi
                  fi

                  i=$((i + 1))
                  if [ "$i" -ge 60 ]; then
                    if [ -n "$desired_rotation_id" ]; then
                      echo "SurrealDB secret did not reach desired rotation id ${desired_rotation_id}" >&2
                      exit 1
                    else
                      echo "SurrealDB secret resourceVersion did not change; using current secret value" >&2
                      break
                    fi
                  fi
                  sleep 2
                done

                password_b64=$(
                  kubectl get secret surrealdb-secrets -n surrealdb \
                    -o jsonpath='{.data.rootPassword}'
                )
                NEW_PASS=$(printf '%s' "$password_b64" | base64 -d)
              }

              run_alter() {
                local pass="$1"
                local resp token result
                resp=$(curl -fsS -X POST -H "Content-Type: application/json" \
                  --data-raw "{\"user\":\"${SURREAL_USER}\",\"pass\":\"${pass}\"}" \
                  http://surrealdb.surrealdb:8000/signin 2>/dev/null) || return 1
                token=$(printf '%s' "$resp" | grep -o '"token":"[^"]*"' | sed 's/"token":"//;s/"//')
                [ -z "$token" ] && return 1
                result=$(curl -fsS \
                  -X POST -H "Content-Type: text/plain" \
                  -H "Authorization: Bearer $token" \
                  --data-raw "DEFINE USER OVERWRITE ${SURREAL_USER} ON ROOT PASSWORD \"${NEW_PASS}\" ROLES OWNER" \
                  http://surrealdb.surrealdb:8000/sql 2>/dev/null) || return 1
                printf '%s\n' "$result"
                printf '%s' "$result" | grep -q '"status":"OK"'
              }

              refresh_snapshot() {
                local current_resource_version
                current_resource_version=$(
                  kubectl get secret surrealdb-secrets -n surrealdb \
                    -o jsonpath='{.metadata.resourceVersion}' 2>/dev/null || true
                )
                kubectl create secret generic surrealdb-password-rotation \
                  --namespace surrealdb \
                  --from-literal=oldPassword="${NEW_PASS}" \
                  --from-literal=oldResourceVersion="${current_resource_version}" \
                  --dry-run=client -o yaml | kubectl apply -f -
              }

              read_new_password

              if run_alter "$NEW_PASS"; then
                echo "Password already matches new credentials"
              elif [ -n "${OLD_PASS:-}" ] && run_alter "$OLD_PASS"; then
                echo "Password updated from snapshotted previous credentials"
              else
                echo "Authentication failed: neither new nor snapshotted previous password worked"
                exit 1
              fi

              if refresh_snapshot; then
                echo "Rotation snapshot updated to current credentials before cleanup"
              else
                echo "Could not refresh rotation snapshot before cleanup" >&2
              fi

              kubectl delete secret surrealdb-password-rotation -n surrealdb \
                --ignore-not-found=true
              echo "Rotation snapshot deleted"
