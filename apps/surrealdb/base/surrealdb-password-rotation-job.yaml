apiVersion: v1
kind: ServiceAccount
metadata:
  name: surrealdb-rotation-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: surrealdb-rotation-role
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["surrealdb-password-rotation"]
  verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: surrealdb-rotation-rolebinding
subjects:
- kind: ServiceAccount
  name: surrealdb-rotation-sa
  namespace: surrealdb
roleRef:
  kind: Role
  name: surrealdb-rotation-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: surrealdb-password-rotation
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: surrealdb-password-rotation
    spec:
      serviceAccountName: surrealdb-rotation-sa
      restartPolicy: OnFailure
      containers:
        - name: rotate
          image: curlimages/curl:8.13.0
          env:
            - name: OLD_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-password-rotation
                  key: oldPassword
                  optional: true
            - name: NEW_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-password-rotation
                  key: newPassword
                  optional: true
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootUser
          command:
            - /bin/sh
            - -c
            - |
              if [ -z "${NEW_PASS:-}" ]; then
                echo "No rotation secret found, nothing to do"
                exit 0
              fi

              i=0
              until curl -fsS http://surrealdb.surrealdb:8000/health >/dev/null 2>&1; do
                i=$((i+1))
                if [ "$i" -ge 60 ]; then echo "Timeout waiting for SurrealDB"; exit 1; fi
                sleep 2
              done

              run_alter() {
                local pass="$1"
                local resp token result
                resp=$(curl -fsS -X POST -H "Content-Type: application/json" \
                  --data-raw "{\"user\":\"${SURREAL_USER}\",\"pass\":\"${pass}\"}" \
                  http://surrealdb.surrealdb:8000/signin 2>/dev/null) || return 1
                token=$(printf '%s' "$resp" | grep -o '"token":"[^"]*"' | sed 's/"token":"//;s/"//')
                [ -z "$token" ] && return 1
                result=$(curl -fsS \
                  -X POST -H "Content-Type: text/plain" \
                  -H "Authorization: Bearer $token" \
                  --data-raw "DEFINE USER OVERWRITE ${SURREAL_USER} ON ROOT PASSWORD '${NEW_PASS}' ROLES OWNER" \
                  http://surrealdb.surrealdb:8000/sql 2>/dev/null) || return 1
                printf '%s\n' "$result"
                printf '%s' "$result" | grep -q '"status":"OK"'
              }

              if run_alter "$NEW_PASS"; then
                echo "Password already matches new credentials"
              elif [ -n "${OLD_PASS:-}" ] && run_alter "$OLD_PASS"; then
                echo "Password updated from previous credentials"
              else
                echo "Authentication failed: neither new nor previous password worked"
                exit 1
              fi

              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              KUBE_NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              curl -fsS \
                -X DELETE \
                -H "Authorization: Bearer $KUBE_TOKEN" \
                --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                "https://kubernetes.default.svc/api/v1/namespaces/${KUBE_NS}/secrets/surrealdb-password-rotation" \
                && echo "Rotation secret deleted" || echo "Rotation secret not found, nothing to clean up"
