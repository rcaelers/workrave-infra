apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surrealdb-tailnet
  annotations:
    tailscale.com/tags: tag:k8s,tag:shared-surrealdb-dev
spec:
  defaultBackend:
    service:
      name: surrealdb
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - surrealdb-dev
