apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guardrail-prd
resources:
  - ../../base
  - surrealdb-secrets.yaml
  - tailnet-ingress.yaml
helmCharts:
  - name: surrealdb
    repo: https://helm.surrealdb.com
    version: 0.4.0
    releaseName: surrealdb
    valuesFile: values.yaml
patches:
  - target:
      kind: PersistentVolumeClaim
      name: surrealdb
    patch: |-
      - op: add
        path: /spec/storageClassName
        value: local-path
