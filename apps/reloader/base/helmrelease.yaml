apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: flux-system
spec:
  interval: 1h
  releaseName: reloader
  targetNamespace: reloader
  install:
    createNamespace: true
  chart:
    spec:
      chart: reloader
      version: 2.2.14
      sourceRef:
        kind: HelmRepository
        name: reloader
        namespace: flux-system
  values:
    reloader:
      watchGlobally: true
