apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-ui
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guardrail-ui
  template:
    metadata:
      labels:
        app: guardrail-ui
    spec:
      containers:
        - name: guardrail-ui
          image: ghcr.io/rcaelers/guardrail-ui:placeholder
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: ORIGIN
              value: "https://crashes.workrave.org"
            - name: GUARDRAIL_API_URL
              value: "http://guardrail-web/api/v1"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
