apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway-helm
  namespace: flux-system
spec:
  interval: 1h
  releaseName: envoy-gateway-helm
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: gateway-helm
      version: v1.7.2
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway-helm
        namespace: flux-system
