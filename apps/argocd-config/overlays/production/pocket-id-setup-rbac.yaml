apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pocket-id-setup
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-secret"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pocket-id-setup
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pocket-id-setup
subjects:
  - kind: ServiceAccount
    name: pocket-id-setup
    namespace: guardrail
  - kind: ServiceAccount
    name: pocket-id-setup
    namespace: guardrail
