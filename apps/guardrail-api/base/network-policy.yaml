apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: guardrail-api-network-policy
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - guardrail-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 80
  egress:
  - to:
    - podSelector:
        matchLabels:
          cnpg.io/cluster: guardrail-db
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: surrealdb
      podSelector:
        matchLabels:
          app.kubernetes.io/name: surrealdb
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: valkey
          app.kubernetes.io/instance: valkey
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: garage
      podSelector:
        matchLabels:
          app.kubernetes.io/name: garage
          app.kubernetes.io/instance: garage
    ports:
    - protocol: TCP
      port: 3900
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
