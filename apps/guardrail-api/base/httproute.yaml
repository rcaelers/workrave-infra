apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guardrail-api
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: guardrail-api
          port: 80
