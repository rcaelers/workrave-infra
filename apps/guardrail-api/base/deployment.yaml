apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: guardrail-api
  template:
    metadata:
      labels:
        app: guardrail-api
      annotations:
        configmap.reloader.stakater.com/reload: "guardrail-config"
        secret.reloader.stakater.com/reload: "guardrail-database-secrets,guardrail-valkey-secrets,guardrail-object-storage-secrets,guardrail-jwk-secrets,guardrail-provisioner-secrets"
    spec:
      serviceAccountName: guardrail-api-sa
      containers:
        - name: guardrail-api
          image: ghcr.io/rcaelers/guardrail-server:placeholder
          command: ["/app/guardrail"]
          args: ["api", "-C", "/config"]
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: config-volume
              mountPath: /config/01-ingress.yaml
              subPath: 01-ingress.yaml
            - name: config-volume
              mountPath: /config/01-database.yaml
              subPath: 01-database.yaml
            - name: config-volume
              mountPath: /config/01-object-storage.yaml
              subPath: 01-object-storage.yaml
            - name: valkey-secret-volume
              mountPath: /config/02-valkey-secret.yaml
              subPath: secrets
            - name: object-storage-secret-volume
              mountPath: /config/03-object-storage-secret.yaml
              subPath: secrets
            - name: jwk-secret-volume
              mountPath: /config/04-jwk-secret.yaml
              subPath: secrets
            - name: provisioner-secret-volume
              mountPath: /config/05-provisioner-secret.yaml
              subPath: secrets
            - name: database-secret-volume
              mountPath: /config/06-database-secret.yaml
              subPath: secrets
          startupProbe:
            httpGet:
              path: /api/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 6
      volumes:
        - name: config-volume
          configMap:
            name: guardrail-config
        - name: valkey-secret-volume
          secret:
            secretName: guardrail-valkey-secrets
        - name: object-storage-secret-volume
          secret:
            secretName: guardrail-object-storage-secrets
        - name: jwk-secret-volume
          secret:
            secretName: guardrail-jwk-secrets
        - name: provisioner-secret-volume
          secret:
            secretName: guardrail-provisioner-secrets
        - name: database-secret-volume
          secret:
            secretName: guardrail-database-secrets
