apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guardrail-prd
resources:
- ../../base
patches:
- path: rolebinding-patch.yaml
- path: database-env-patch.yaml
- path: ingress-host-patch.json
  target:
    group: networking.k8s.io
    kind: Ingress
    name: guardrail-api
    version: v1
images:
- name: ghcr.io/rcaelers/guardrail-api
  newTag: production
- name: ghcr.io/rcaelers/guardrail-schema-sync
  newTag: production
