apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-tailnet
  annotations:
    tailscale.com/proxy-group: tailnet-ingress
    tailscale.com/tags: tag:shared-minio
spec:
  defaultBackend:
    service:
      name: minio-console
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - minio
