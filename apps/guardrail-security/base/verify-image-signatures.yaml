apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-guardrail-images
  annotations:
    policies.kyverno.io/title: Verify Guardrail Image Signatures
    policies.kyverno.io/description: >-
      Verifies that all guardrail container images are signed with cosign
      keyless signatures via GitHub Actions before they are admitted to the
      cluster.
spec:
  validationFailureAction: Enforce
  webhookTimeoutSeconds: 30
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - guardrail-dev
                - guardrail-prd
      verifyImages:
        - imageReferences:
            - "ghcr.io/rcaelers/guardrail-*"
          attestors:
            - entries:
                - keyless:
                    issuer: "https://token.actions.githubusercontent.com"
                    subjectRegExp: "https://github.com/rcaelers/guardrail/\\.github/workflows/containers\\.yml@refs/.*"
                    rekor:
                      url: "https://rekor.sigstore.dev"
