apiVersion: v1
kind: ServiceAccount
metadata:
  name: pocket-id-setup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pocket-id-setup
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pocket-id-setup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pocket-id-setup
subjects:
  - kind: ServiceAccount
    name: pocket-id-setup
