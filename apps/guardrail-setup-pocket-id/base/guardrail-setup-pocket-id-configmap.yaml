apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrail-setup-pocket-id-script
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    log() {
      printf '%s\n' "$*"
    }

    request_json() {
      method=$1
      url=$2
      body=${3-}
      response_file=$(mktemp)

      if [ -n "$body" ]; then
        status=$(curl -sS \
          -o "$response_file" \
          -w '%{http_code}' \
          -X "$method" \
          -H 'Content-Type: application/json' \
          -H "X-API-KEY: $POCKET_ID_API_KEY" \
          "$url" \
          -d "$body")
      else
        status=$(curl -sS \
          -o "$response_file" \
          -w '%{http_code}' \
          -X "$method" \
          -H "X-API-KEY: $POCKET_ID_API_KEY" \
          "$url")
      fi

      case "$status" in
        2*)
          cat "$response_file"
          rm -f "$response_file"
          ;;
        *)
          log "Pocket ID request failed: $method $url -> HTTP $status"
          cat "$response_file" >&2
          rm -f "$response_file"
          return 1
          ;;
      esac
    }

    request_status() {
      method=$1
      url=$2
      output_file=$3
      body=${4-}

      if [ -n "$body" ]; then
        curl -sS \
          -o "$output_file" \
          -w '%{http_code}' \
          -X "$method" \
          -H 'Content-Type: application/json' \
          -H "X-API-KEY: $POCKET_ID_API_KEY" \
          "$url" \
          -d "$body"
        return
      fi

      curl -sS \
        -o "$output_file" \
        -w '%{http_code}' \
        -X "$method" \
        -H "X-API-KEY: $POCKET_ID_API_KEY" \
        "$url"
    }

    request_noauth_json() {
      method=$1
      url=$2
      body=${3-}
      response_file=$(mktemp)

      if [ -n "$body" ]; then
        status=$(curl -sS \
          -o "$response_file" \
          -w '%{http_code}' \
          -X "$method" \
          -H 'Content-Type: application/json' \
          "$url" \
          -d "$body")
      else
        status=$(curl -sS \
          -o "$response_file" \
          -w '%{http_code}' \
          -X "$method" \
          "$url")
      fi

      case "$status" in
        2*)
          cat "$response_file"
          rm -f "$response_file"
          ;;
        *)
          log "Pocket ID request failed: $method $url -> HTTP $status"
          cat "$response_file" >&2
          rm -f "$response_file"
          return 1
          ;;
      esac
    }

    settings_value() {
      yq -r "$1 // \"\"" "$SETTINGS_FILE"
    }

    setup_value() {
      yq -r "$1 // \"\"" "$SETUP_CONFIG_FILE"
    }

    SETTINGS_FILE=${SETTINGS_FILE:-/config/01-config.yaml}
    SETUP_CONFIG_FILE=${SETUP_CONFIG_FILE:-/setup/setup-config.yaml}

    POCKET_ID_URL=$(settings_value '.provisioner.pocket_id.api_url')
    POCKET_ID_PUBLIC_URL=$(settings_value '.provisioner.pocket_id.public_url')
    OIDC_CLIENT_ID=$(settings_value '.auth.oidc.client_id')
    OIDC_CLIENT_NAME=$(settings_value '.auth.name')
    OIDC_CALLBACK_URL=$(settings_value '.auth.oidc.callback_url')
    OIDC_LOGOUT_CALLBACK_URL=$(settings_value '.auth.oidc.logout_callback_url')
    OIDC_LAUNCH_URL=$(settings_value '.auth.oidc.launch_url')
    POCKET_ID_ADMIN_USERNAME=$(setup_value '.pocket_id_admin.username')
    POCKET_ID_ADMIN_EMAIL=$(setup_value '.pocket_id_admin.email')
    POCKET_ID_ADMIN_FIRST_NAME=$(setup_value '.pocket_id_admin.first_name')
    POCKET_ID_ADMIN_LAST_NAME=$(setup_value '.pocket_id_admin.last_name')

    : "${POCKET_ID_URL:?POCKET_ID_URL is required}"
    : "${POCKET_ID_PUBLIC_URL:?POCKET_ID_PUBLIC_URL is required}"
    : "${POCKET_ID_API_KEY:?POCKET_ID_API_KEY is required}"
    : "${POCKET_ID_ADMIN_USERNAME:?POCKET_ID_ADMIN_USERNAME is required}"
    : "${POCKET_ID_ADMIN_EMAIL:?POCKET_ID_ADMIN_EMAIL is required}"
    : "${POCKET_ID_ADMIN_FIRST_NAME:?POCKET_ID_ADMIN_FIRST_NAME is required}"
    : "${POCKET_ID_ADMIN_LAST_NAME:?POCKET_ID_ADMIN_LAST_NAME is required}"
    : "${OIDC_CLIENT_ID:?OIDC_CLIENT_ID is required}"
    : "${OIDC_CLIENT_NAME:?OIDC_CLIENT_NAME is required}"
    : "${OIDC_CALLBACK_URL:?OIDC_CALLBACK_URL is required}"
    : "${OIDC_LOGOUT_CALLBACK_URL:?OIDC_LOGOUT_CALLBACK_URL is required}"
    : "${OIDC_LAUNCH_URL:?OIDC_LAUNCH_URL is required}"

    POCKET_ID_URL=${POCKET_ID_URL%/}
    POCKET_ID_PUBLIC_URL=${POCKET_ID_PUBLIC_URL%/}

    log "Waiting for Pocket ID API..."
    attempt=0
    until request_json GET "$POCKET_ID_URL/api/users" >/dev/null 2>&1; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 90 ]; then
        log "Pocket ID API did not become ready in time"
        exit 1
      fi
      sleep 2
    done
    log "Pocket ID API is ready (attempt $attempt)"

    log "Ensuring initial admin user exists..."
    users_json=$(request_json GET "$POCKET_ID_URL/api/users")
    admin_id=$(printf '%s' "$users_json" | jq -r --arg username "$POCKET_ID_ADMIN_USERNAME" --arg email "$POCKET_ID_ADMIN_EMAIL" '
      .data[]
      | select(.username == $username or .email == $email)
      | .id
    ' | head -n 1)
    admin_username=$(printf '%s' "$users_json" | jq -r --arg username "$POCKET_ID_ADMIN_USERNAME" --arg email "$POCKET_ID_ADMIN_EMAIL" '
      .data[]
      | select(.username == $username or .email == $email)
      | .username
    ' | head -n 1)

    if [ -z "$admin_id" ]; then
      log "No admin user found; calling /api/signup/setup to create '$POCKET_ID_ADMIN_USERNAME'..."
      setup_payload=$(jq -nc \
        --arg username "$POCKET_ID_ADMIN_USERNAME" \
        --arg email "$POCKET_ID_ADMIN_EMAIL" \
        --arg first_name "$POCKET_ID_ADMIN_FIRST_NAME" \
        --arg last_name "$POCKET_ID_ADMIN_LAST_NAME" \
        '{
          username: $username,
          email: $email,
          firstName: $first_name,
          lastName: $last_name
        }')
      request_noauth_json POST "$POCKET_ID_URL/api/signup/setup" "$setup_payload" >/dev/null

      users_json=$(request_json GET "$POCKET_ID_URL/api/users")
      admin_id=$(printf '%s' "$users_json" | jq -r --arg username "$POCKET_ID_ADMIN_USERNAME" --arg email "$POCKET_ID_ADMIN_EMAIL" '
        .data[]
        | select(.username == $username or .email == $email)
        | .id
      ' | head -n 1)
      admin_username=$(printf '%s' "$users_json" | jq -r --arg username "$POCKET_ID_ADMIN_USERNAME" --arg email "$POCKET_ID_ADMIN_EMAIL" '
        .data[]
        | select(.username == $username or .email == $email)
        | .username
      ' | head -n 1)

      if [ -z "$admin_id" ]; then
        log "ERROR: admin user was not found after /api/signup/setup call"
        exit 1
      fi
      log "Admin user created: $admin_username ($admin_id)"
    else
      log "Admin user already exists: $admin_username ($admin_id), skipping creation"
    fi

    if [ -z "$admin_id" ]; then
      log "Pocket ID admin user was not found after setup"
      exit 1
    fi

    if [ -z "$admin_username" ]; then
      admin_username=$POCKET_ID_ADMIN_USERNAME
    fi

    log "Ensuring Guardrail OIDC client exists..."
    client_tmp=$(mktemp)
    client_status=$(request_status GET "$POCKET_ID_URL/api/oidc/clients/$OIDC_CLIENT_ID" "$client_tmp")

    client_payload=$(jq -nc \
      --arg id "$OIDC_CLIENT_ID" \
      --arg name "$OIDC_CLIENT_NAME" \
      --arg callback "$OIDC_CALLBACK_URL" \
      --arg logout "$OIDC_LOGOUT_CALLBACK_URL" \
      --arg launch "$OIDC_LAUNCH_URL" \
      '{
        id: $id,
        name: $name,
        callbackURLs: [$callback],
        logoutCallbackURLs: [$logout],
        isPublic: false,
        pkceEnabled: true,
        requiresReauthentication: false,
        credentials: {
          federatedIdentities: []
        },
        launchURL: $launch,
        isGroupRestricted: false
      }')

    case "$client_status" in
      200)
        request_json PUT "$POCKET_ID_URL/api/oidc/clients/$OIDC_CLIENT_ID" "$client_payload" >/dev/null
        log "Updated Guardrail OIDC client: $OIDC_CLIENT_ID"
        ;;
      404)
        request_json POST "$POCKET_ID_URL/api/oidc/clients" "$client_payload" >/dev/null
        log "Created Guardrail OIDC client: $OIDC_CLIENT_ID"
        ;;
      *)
        log "Unexpected response while checking OIDC client: HTTP $client_status"
        cat "$client_tmp"
        rm -f "$client_tmp"
        exit 1
        ;;
    esac
    rm -f "$client_tmp"

    log "Guardrail auth bootstrap completed"

    log "Ensuring ArgoCD OIDC client exists..."
    argocd_client_tmp=$(mktemp)
    argocd_client_status=$(request_status GET "$POCKET_ID_URL/api/oidc/clients/argocd" "$argocd_client_tmp")

    argocd_client_payload=$(jq -nc '{
      id: "argocd",
      name: "ArgoCD",
      callbackURLs: ["https://argocd.tailc4583f.ts.net/auth/callback"],
      logoutCallbackURLs: ["https://argocd.tailc4583f.ts.net"],
      isPublic: false,
      pkceEnabled: true,
      requiresReauthentication: false,
      credentials: {
        federatedIdentities: []
      },
      launchURL: "https://argocd.tailc4583f.ts.net",
      isGroupRestricted: false
    }')

    case "$argocd_client_status" in
      200)
        request_json PUT "$POCKET_ID_URL/api/oidc/clients/argocd" "$argocd_client_payload" >/dev/null
        log "Updated ArgoCD OIDC client"
        ;;
      404)
        request_json POST "$POCKET_ID_URL/api/oidc/clients" "$argocd_client_payload" >/dev/null
        log "Created ArgoCD OIDC client"
        ;;
      *)
        log "Unexpected response while checking ArgoCD OIDC client: HTTP $argocd_client_status"
        cat "$argocd_client_tmp"
        rm -f "$argocd_client_tmp"
        exit 1
        ;;
    esac
    rm -f "$argocd_client_tmp"

    log "Ensuring ArgoCD OIDC client secret is stored in argocd-secret..."
    K8S_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    K8S_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    K8S_URL=https://kubernetes.default.svc

    existing_secret=$(curl -s --cacert "$K8S_CA" \
      -H "Authorization: Bearer $K8S_TOKEN" \
      "$K8S_URL/api/v1/namespaces/argocd/secrets/argocd-secret" \
      | jq -r '.data["oidc.pocket-id.clientSecret"] // empty')

    if [ -z "$existing_secret" ]; then
      client_secret=$(curl -s -X POST \
        -H "X-API-KEY: $POCKET_ID_API_KEY" \
        "$POCKET_ID_URL/api/oidc/clients/argocd/secret" | jq -r '.secret')
      client_secret_b64=$(printf '%s' "$client_secret" | base64 | tr -d '\n')
      curl -s -X PATCH --cacert "$K8S_CA" \
        -H "Authorization: Bearer $K8S_TOKEN" \
        -H "Content-Type: application/merge-patch+json" \
        "$K8S_URL/api/v1/namespaces/argocd/secrets/argocd-secret" \
        -d "{\"data\":{\"oidc.pocket-id.clientSecret\":\"$client_secret_b64\"}}" > /dev/null
      log "ArgoCD OIDC client secret stored in argocd-secret"
    else
      log "ArgoCD OIDC client secret already exists in argocd-secret, skipping rotation"
    fi

    log "ArgoCD OIDC client bootstrap completed"
