apiVersion: batch/v1
kind: Job
metadata:
  name: guardrail-setup-pocket-id
  annotations:
    kustomize.toolkit.fluxcd.io/force: "true"
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: pocket-id-setup
      containers:
        - name: setup
          image: alpine:3.23.4
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache curl jq yq >/dev/null 2>&1 && /bin/sh /scripts/setup.sh
          env:
            - name: POCKET_ID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secrets
                  key: STATIC_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: config
              mountPath: /config
            - name: setup-config
              mountPath: /setup
      volumes:
        - name: scripts
          configMap:
            name: guardrail-setup-pocket-id-script
            defaultMode: 0755
        - name: config
          configMap:
            name: guardrail-config
        - name: setup-config
          configMap:
            name: guardrail-setup-pocket-id-config
