web_server:
  port: 80
api_server:
  port: 80
  enable_webauthn: false
ingestion_server:
  port: 80
processor:
  maximum_frame_count: 10
  delimiter: "|"
  skip_patterns: []
  end_patterns:
    - "WinMainCRTStartup"
    - "mainCRTStartup"
    - "main()"
minidumps:
  mandatory_annotations:
    - "product"
    - "version"
database:
  endpoint: ws://surrealdb:8000
  namespace: guardrail
  database: guardrail
object_storage:
  region: us-east-1
  bucket: guardrail
  endpoint: http://garage:3900
  allow_http: true
auth:
  id: crashes-dev.workrave.org
  origin: https://crashes-dev.workrave.org/
  name: Guardrail
  jwk:
    token_validity_in_minutes: 30
    public_key:  |
      -----BEGIN PUBLIC KEY-----
      MCowBQYDK2VwAyEAUSg2FBR6AEzLffDVQMNsxwRrExjGgolGLyheQeHZDq0=
      -----END PUBLIC KEY-----
  oidc:
    issuer_url: https://auth-dev.workrave.org
    internal_issuer_url: http://pocket-id
    client_id: guardrail
    callback_url: https://crashes-dev.workrave.org/auth/oidc/callback
    logout_callback_url: https://crashes-dev.workrave.org/
    launch_url: https://crashes-dev.workrave.org/
    self_service_url: https://auth-dev.workrave.org
    pkce: true
provisioner:
  pocket_id:
    api_url: http://pocket-id
    public_url: https://auth-dev.workrave.org
