processor:
  maximum_frame_count: 10
  delimiter: "|"
  skip_patterns: []
  end_patterns:
    - "WinMainCRTStartup"
    - "mainCRTStartup"
    - "main()"
oidc:
  issuer_url: https://rauthy-dev.workrave.org/auth/v1
  internal_issuer_url: http://rauthy/auth/v1
  client_id: guardrail
  callback_url: https://crashes-dev.workrave.org/auth/oidc/callback
  logout_callback_url: https://crashes-dev.workrave.org/
  launch_url: https://crashes-dev.workrave.org/
  self_service_url: https://rauthy-dev.workrave.org/auth/v1
  pkce: true
provisioner:
  rauthy:
    api_url: http://rauthy
    public_url: https://rauthy-dev.workrave.org/auth/v1
email:
  from: "noreply@workrave.org"
