processor:
  maximum_frame_count: 10
  delimiter: "|"
  skip_patterns: []
  end_patterns:
    - "WinMainCRTStartup"
    - "mainCRTStartup"
    - "main()"
oidc:
  issuer_url: https://auth.workrave.org
  internal_issuer_url: http://pocket-id
  client_id: guardrail
  callback_url: https://crashes.workrave.org/auth/oidc/callback
  logout_callback_url: https://crashes.workrave.org/
  launch_url: https://crashes.workrave.org/
  self_service_url: https://auth.workrave.org
  pkce: true
provisioner:
  pocket_id:
    api_url: http://pocket-id
    public_url: https://auth.workrave.org
