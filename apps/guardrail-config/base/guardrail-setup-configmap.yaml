apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrail-setup-script
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    SURREAL_URL="http://surrealdb:8000"
    SURREAL_NS="${DATABASE_NAMESPACE:-guardrail}"
    SURREAL_DB="${DATABASE_NAME:-guardrail}"

    log() { printf '%s\n' "$*"; }

    # Execute SurrealQL - reads SQL text from stdin, returns JSON
    # Fails if SurrealDB returns any statement with status ERR.
    surql() {
      __r=$(curl -sf \
        -X POST "${SURREAL_URL}/sql" \
        -H "Accept: application/json" \
        -H "Content-Type: text/plain" \
        -H "Surreal-NS: ${SURREAL_NS}" \
        -H "Surreal-DB: ${SURREAL_DB}" \
        -u "${SURREAL_USER}:${SURREAL_PASS}" \
        --data-binary @-)
      if printf '%s' "$__r" | jq -e 'map(select(.status == "ERR")) | length > 0' >/dev/null 2>&1; then
        log "SurrealDB error: $(printf '%s' "$__r" | jq -r '[.[] | select(.status == "ERR") | (.detail // .result | tostring)] | join("; ")' 2>/dev/null || printf '%s' "$__r")" >&2
        return 1
      fi
      printf '%s\n' "$__r"
    }

    # Wait for guardrail API to be ready (which also implies SurrealDB is up)
    log "Waiting for Guardrail API..."
    attempt=0
    until curl -sf http://guardrail-api/api/ready >/dev/null 2>&1; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 60 ]; then
        log "Guardrail API did not become ready in time"
        exit 1
      fi
      sleep 5
    done
    log "Guardrail API is ready"

    # Create Workrave product if it doesn't exist; retrieve existing id otherwise
    EXISTING_ID=$(printf "SELECT meta::id(id) as id FROM products WHERE name = 'Workrave' LIMIT 1;" \
      | surql | jq -r '.[0].result[0].id // empty')

    if [ -z "$EXISTING_ID" ]; then
      printf "CREATE type::record('products', u'%s') CONTENT {
        name: 'Workrave',
        slug: 'workrave',
        description: 'Workrave is a free program that assists in the recovery and prevention of Repetitive Strain Injury (RSI)',
        color: '#9333ea',
        public: true,
        accepting_crashes: true,
        metadata: {},
        created_at: time::now(),
        updated_at: time::now()
      };" "$WORKRAVE_PRODUCT_ID" | surql
      log "Created Workrave product (id: ${WORKRAVE_PRODUCT_ID})"
    else
      log "Workrave product already exists (id: ${EXISTING_ID})"
    fi
  
    # Ensure the anonymous user record exists so anonymous JWT authentication succeeds.
    printf "UPSERT type::record('users', 'anonymous') CONTENT {
      username: 'anonymous',
      email: 'anonymous@workrave.org',
      name: 'Anonymous',
      avatar: 'A',
      is_admin: false,
      created_at: time::now(),
      updated_at: time::now()
    };" | surql
    log "Anonymous user record ensured"

    # Insert a token record if none exists yet for the given entitlement+product.
    # token_id is used as the SurrealDB record key (it is already unique).
    # token, token_id, token_hash come from SOPS secrets; product_id from plain ConfigMap.
    create_token_if_needed() {
      entitlement="$1"
      description="$2"
      token="$3"
      token_id="$4"
      token_hash="$5"

      count=$(printf "SELECT count() as count FROM api_tokens WHERE product_id = type::record('products', u'%s') AND '%s' INSIDE entitlements GROUP ALL;" \
        "$WORKRAVE_PRODUCT_ID" "$entitlement" \
        | surql | jq -r '.[0].result[0].count // 0')

      if [ "$count" != "0" ]; then
        log "${description} token already exists, skipping"
        return
      fi

      printf "CREATE type::record('api_tokens', u'%s') CONTENT {
        description: '%s',
        token_id: u'%s',
        token_hash: '%s',
        product_id: type::record('products', u'%s'),
        entitlements: ['%s'],
        is_active: true,
        created_at: time::now(),
        updated_at: time::now()
      };" \
        "$token_id" "$description" "$token_id" "$token_hash" "$WORKRAVE_PRODUCT_ID" "$entitlement" \
        | surql

      log "${description} token created (id: ${token_id})"
      log "${description} bearer token: ${token}"
    }

    create_token_if_needed "minidump-upload" "Minidump upload" \
      "$WORKRAVE_MINIDUMP_TOKEN" "$WORKRAVE_MINIDUMP_TOKEN_ID" "$WORKRAVE_MINIDUMP_TOKEN_HASH"
    create_token_if_needed "symbol-upload" "Symbol upload" \
      "$WORKRAVE_SYMBOLS_TOKEN" "$WORKRAVE_SYMBOLS_TOKEN_ID" "$WORKRAVE_SYMBOLS_TOKEN_HASH"

    # ── Workrave Demo product ────────────────────────────────────────────
    # INSERT IGNORE creates the record only if it doesn't exist.
    # The subsequent UPDATE SET enforces public:true even on existing records.
    printf "INSERT IGNORE INTO products {
      id: type::record('products', u'%s'),
      name: 'Workrave Demo',
      slug: 'workrave-demo',
      description: 'Demo Workrave data set',
      color: '#9333ea',
      public: true,
      accepting_crashes: true,
      metadata: {},
      created_at: time::now(),
      updated_at: time::now()
    };" "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    printf "UPDATE type::record('products', u'%s') SET
      public = true, accepting_crashes = true, updated_at = time::now();"\
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    log "Workrave Demo product ready (id: ${WORKRAVE_DEMO_PRODUCT_ID})"

    # Clean up any old seed data that may have been created with auto-generated IDs
    # so we can re-insert with stable IDs (required for crash->group references).
    printf "DELETE crash_groups WHERE product_id = type::record('products', u'%s')
      AND string::starts_with(fingerprint, 'seed-');"\
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    printf "DELETE crashes WHERE product_id = type::record('products', u'%s')
      AND string::starts_with(fingerprint, 'seed-');"\
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql

    # Insert a crash group with a stable record ID (idempotent via INSERT IGNORE).
    seed_demo_group() {
      group_key="$1" signal="$2" count="$3" first_seen="$4" last_seen="$5" status="$6"
      printf "INSERT IGNORE INTO crash_groups {
        id: type::record('crash_groups', 'seed-%s'),
        product_id: type::record('products', u'%s'),
        fingerprint: 'seed-%s',
        signal: '%s',
        count: %s,
        first_seen: d'%s',
        last_seen: d'%s',
        status: '%s',
        created_at: time::now(),
        updated_at: time::now()
      };" \
        "$group_key" "$WORKRAVE_DEMO_PRODUCT_ID" "$group_key" \
        "$signal" "$count" "$first_seen" "$last_seen" "$status" | surql
    }

    # Insert a crash record linked to a crash group (idempotent via INSERT IGNORE).
    seed_demo_crash() {
      crash_id="$1" group_key="$2" version="$3" platform="$4" os="$5" created_at="$6"
      printf "INSERT IGNORE INTO crashes {
        id: type::record('crashes', 'seed-%s'),
        product_id: type::record('products', u'%s'),
        group_id: type::record('crash_groups', 'seed-%s'),
        fingerprint: 'seed-%s',
        report: {
          annotations: { product: 'workrave-demo', version: '%s', platform: '%s' },
          system_info: { os: '%s' }
        },
        created_at: d'%s',
        updated_at: d'%s'
      };" \
        "$crash_id" "$WORKRAVE_DEMO_PRODUCT_ID" "$group_key" "$group_key" \
        "$version" "$platform" "$os" "$created_at" "$created_at" | surql
    }

    seed_demo_group "GR-0004" "bad_access_kern_protection_failure" 242 "2026-04-17T12:44:56Z" "2026-04-23T12:44:56Z" "triaged"
    seed_demo_crash "GR-0004-001" "GR-0004" "2.13.4" "macos" "Mac OS X 14.6.1" "2026-04-22T09:00:00Z"
    seed_demo_crash "GR-0004-002" "GR-0004" "2.13.4" "macos" "Mac OS X 14.5.0" "2026-04-21T14:00:00Z"

    seed_demo_group "GR-0016" "bad_access_kern_protection_failure"  72 "2026-04-12T12:44:56Z" "2026-04-20T12:44:56Z" "new"
    seed_demo_crash "GR-0016-001" "GR-0016" "2.13.2" "macos" "Mac OS X 14.4.1" "2026-04-20T10:00:00Z"
    seed_demo_crash "GR-0016-002" "GR-0016" "2.13.2" "macos" "Mac OS X 14.3.0" "2026-04-18T16:00:00Z"

    seed_demo_group "GR-0008" "breakpoint"                          40 "2026-03-29T12:44:56Z" "2026-04-21T12:44:56Z" "new"
    seed_demo_crash "GR-0008-001" "GR-0008" "2.14.0" "windows" "Windows 11 22H2" "2026-04-21T11:00:00Z"
    seed_demo_crash "GR-0008-002" "GR-0008" "2.14.0" "windows" "Windows 10 21H2" "2026-04-19T08:00:00Z"

    seed_demo_group "GR-0021" "bad_access_kern_invalid_address"     28 "2026-03-04T13:44:56Z" "2026-04-23T12:44:56Z" "triaged"
    seed_demo_crash "GR-0021-001" "GR-0021" "2.12.9" "macos" "Mac OS X 14.2.1" "2026-04-23T07:00:00Z"
    seed_demo_crash "GR-0021-002" "GR-0021" "2.12.9" "macos" "Mac OS X 14.1.0" "2026-04-20T12:00:00Z"

    seed_demo_group "GR-0057" "bad_access_kern_invalid_address"     26 "2026-03-10T13:44:56Z" "2026-04-23T12:44:56Z" "new"
    seed_demo_crash "GR-0057-001" "GR-0057" "2.13.2" "macos" "Mac OS X 14.3.0" "2026-04-23T06:00:00Z"
