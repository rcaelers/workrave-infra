apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrail-setup-script
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    SURREAL_URL="http://surrealdb:8000"
    SURREAL_NS="${DATABASE_NAMESPACE:-guardrail}"
    SURREAL_DB="${DATABASE_NAME:-guardrail}"

    log() { printf '%s\n' "$*"; }

    # Execute SurrealQL - reads SQL text from stdin, returns JSON
    surql() {
      curl -sf \
        -X POST "${SURREAL_URL}/sql" \
        -H "Accept: application/json" \
        -H "Content-Type: text/plain" \
        -H "Surreal-NS: ${SURREAL_NS}" \
        -H "Surreal-DB: ${SURREAL_DB}" \
        -u "${SURREAL_USER}:${SURREAL_PASS}" \
        --data-binary @-
    }

    # Wait for guardrail API to be ready (which also implies SurrealDB is up)
    log "Waiting for Guardrail API..."
    attempt=0
    until curl -sf http://guardrail-api/api/ready >/dev/null 2>&1; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 60 ]; then
        log "Guardrail API did not become ready in time"
        exit 1
      fi
      sleep 5
    done
    log "Guardrail API is ready"

    # Create Workrave product if it doesn't exist; retrieve existing id otherwise
    EXISTING_ID=$(printf "SELECT meta::id(id) as id FROM products WHERE name = 'Workrave' LIMIT 1;" \
      | surql | jq -r '.[0].result[0].id // empty')

    if [ -z "$EXISTING_ID" ]; then
      printf "CREATE type::record('products', u'%s') CONTENT {
        name: 'Workrave',
        slug: 'workrave',
        description: 'Workrave is a free program that assists in the recovery and prevention of Repetitive Strain Injury (RSI)',
        color: '#9333ea',
        public: true,
        accepting_crashes: true,
        metadata: {},
        created_at: time::now(),
        updated_at: time::now()
      };" "$WORKRAVE_PRODUCT_ID" | surql >/dev/null
      log "Created Workrave product (id: ${WORKRAVE_PRODUCT_ID})"
    else
      log "Workrave product already exists (id: ${EXISTING_ID})"
    fi
  
    # Ensure the anonymous user record exists so anonymous JWT authentication succeeds.
    printf "UPSERT type::record('users', 'anonymous') CONTENT {
      username: 'anonymous',
      email: 'anonymous@localhost',
      name: 'Anonymous',
      avatar: 'A',
      is_admin: false,
      created_at: time::now(),
      updated_at: time::now()
    };" | surql >/dev/null
    log "Anonymous user record ensured"

    # Insert a token record if none exists yet for the given entitlement+product.
    # token_id is used as the SurrealDB record key (it is already unique).
    # token, token_id, token_hash come from SOPS secrets; product_id from plain ConfigMap.
    create_token_if_needed() {
      entitlement="$1"
      description="$2"
      token="$3"
      token_id="$4"
      token_hash="$5"

      count=$(printf "SELECT count() as count FROM api_tokens WHERE product_id = u'%s' AND '%s' INSIDE entitlements GROUP ALL;" \
        "$WORKRAVE_PRODUCT_ID" "$entitlement" \
        | surql | jq -r '.[0].result[0].count // 0')

      if [ "$count" != "0" ]; then
        log "${description} token already exists, skipping"
        return
      fi

      printf "CREATE type::record('api_tokens', u'%s') CONTENT {
        description: '%s',
        token_id: u'%s',
        token_hash: '%s',
        product_id: u'%s',
        entitlements: ['%s'],
        is_active: true,
        created_at: time::now(),
        updated_at: time::now()
      };" \
        "$token_id" "$description" "$token_id" "$token_hash" "$WORKRAVE_PRODUCT_ID" "$entitlement" \
        | surql >/dev/null

      log "${description} token created (id: ${token_id})"
      log "${description} bearer token: ${token}"
    }

    create_token_if_needed "minidump-upload" "Minidump upload" \
      "$WORKRAVE_MINIDUMP_TOKEN" "$WORKRAVE_MINIDUMP_TOKEN_ID" "$WORKRAVE_MINIDUMP_TOKEN_HASH"
    create_token_if_needed "symbol-upload" "Symbol upload" \
      "$WORKRAVE_SYMBOLS_TOKEN" "$WORKRAVE_SYMBOLS_TOKEN_ID" "$WORKRAVE_SYMBOLS_TOKEN_HASH"

    # Upsert Workrave Demo product (unconditional so it always exists with correct settings)
    printf "UPSERT type::record('products', u'%s') CONTENT {
      name: 'Workrave Demo',
      slug: 'workrave-demo',
      description: 'Demo Workrave data set',
      color: '#9333ea',
      public: true,
      accepting_crashes: true,
      metadata: {},
      created_at: time::now(),
      updated_at: time::now()
    };" "$WORKRAVE_DEMO_PRODUCT_ID" | surql >/dev/null
    log "Workrave Demo product upserted (id: ${WORKRAVE_DEMO_PRODUCT_ID})"

    # Seed demo crash groups - INSERT IGNORE is idempotent (skips on unique-index conflict)
    seed_demo_group() {
      fingerprint="$1" signal="$2" count="$3" first_seen="$4" last_seen="$5" status="$6"
      printf "INSERT IGNORE INTO crash_groups {
        product_id: type::record('products', u'%s'),
        fingerprint: '%s',
        signal: '%s',
        count: %s,
        first_seen: d'%s',
        last_seen: d'%s',
        status: '%s',
        created_at: time::now(),
        updated_at: time::now()
      };" \
        "$WORKRAVE_DEMO_PRODUCT_ID" "$fingerprint" "$signal" "$count" \
        "$first_seen" "$last_seen" "$status" \
        | surql >/dev/null
      log "Seeded demo crash group: $fingerprint"
    }

    seed_demo_group "seed-GR-0004" "bad_access_kern_protection_failure" 242 "2026-04-17T12:44:56Z" "2026-04-23T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0016" "bad_access_kern_protection_failure"  72 "2026-04-12T12:44:56Z" "2026-04-20T12:44:56Z" "new"
    seed_demo_group "seed-GR-0008" "breakpoint"                          40 "2026-03-29T12:44:56Z" "2026-04-21T12:44:56Z" "new"
    seed_demo_group "seed-GR-0021" "bad_access_kern_invalid_address"     28 "2026-03-04T13:44:56Z" "2026-04-23T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0057" "bad_access_kern_invalid_address"     26 "2026-03-10T13:44:56Z" "2026-04-23T12:44:56Z" "new"
    seed_demo_group "seed-GR-0042" "bus_bus_adrerr"                      24 "2026-03-31T12:44:56Z" "2026-04-21T12:44:56Z" "new"
    seed_demo_group "seed-GR-0051" "bad_access_kern_invalid_address"     19 "2026-03-29T13:44:56Z" "2026-04-21T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0027" "bad_access_kern_invalid_address"     17 "2026-04-08T12:44:56Z" "2026-04-22T12:44:56Z" "new"
    seed_demo_group "seed-GR-0010" "bad_access_kern_protection_failure"  15 "2026-03-22T13:44:56Z" "2026-04-21T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0036" "bus_bus_adrerr"                      14 "2026-04-03T12:44:56Z" "2026-04-22T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0030" "bus_bus_adrerr"                      12 "2026-04-16T12:44:56Z" "2026-04-22T12:44:56Z" "triaged"
    seed_demo_group "seed-GR-0046" "bad_access_kern_protection_failure"   9 "2026-03-11T13:44:56Z" "2026-04-22T12:44:56Z" "new"
    seed_demo_group "seed-GR-0038" "breakpoint"                           6 "2026-02-23T13:44:56Z" "2026-04-21T12:44:56Z" "new"
    seed_demo_group "seed-GR-0043" "access_violation_write"               5 "2026-04-12T12:44:56Z" "2026-04-23T12:44:56Z" "resolved"
    seed_demo_group "seed-GR-0024" "bus_bus_adrerr"                       2 "2026-03-24T13:44:56Z" "2026-04-23T12:44:56Z" "triaged"
    log "Workrave Demo crash groups seeded"

    log "Guardrail setup complete"
