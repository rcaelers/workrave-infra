apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-processor
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: guardrail-processor
  template:
    metadata:
      labels:
        app: guardrail-processor
      annotations:
        configmap.reloader.stakater.com/reload: "guardrail-config"
        secret.reloader.stakater.com/reload: "guardrail-valkey-secrets,guardrail-object-storage-secrets"
    spec:
      serviceAccountName: guardrail-processor-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: guardrail-processor
          image: ghcr.io/rcaelers/guardrail-server:placeholder
          command: ["/app/guardrail"]
          args: ["processor", "-C", "/config"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: health
              containerPort: 9090
              protocol: TCP
          startupProbe:
            httpGet:
              path: /live
              port: health
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          env:
            - name: RUST_LOG
              value: "guardrail=debug,apalis=debug,apalis_redis=debug"
          volumeMounts:
            - name: config-volume
              mountPath: /config/01-object-storage.yaml
              subPath: 01-object-storage.yaml
            - name: valkey-secret-volume
              mountPath: /config/02-valkey-secret.yaml
              subPath: secrets
            - name: object-storage-secret-volume
              mountPath: /config/03-object-storage-secret.yaml
              subPath: secrets
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: config-volume
          configMap:
            name: guardrail-config
        - name: valkey-secret-volume
          secret:
            secretName: guardrail-valkey-secrets
        - name: object-storage-secret-volume
          secret:
            secretName: guardrail-object-storage-secrets
        - name: tmp-volume
          emptyDir: {}
