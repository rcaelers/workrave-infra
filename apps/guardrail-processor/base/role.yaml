apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: guardrail-processor-role
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["guardrail-config"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["guardrail-secrets", "minio-secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
  resourceNames: ["guardrail-processor-*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: guardrail-processor-rolebinding
subjects:
- kind: ServiceAccount
  name: guardrail-processor-sa
  # The namespace will be set in each overlay
  namespace: default
roleRef:
  kind: Role
  name: guardrail-processor-role
  apiGroup: rbac.authorization.k8s.io
