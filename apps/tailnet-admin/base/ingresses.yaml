apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-tailnet
  namespace: argocd
  annotations:
    tailscale.com/tags: tag:k8s,tag:shared-argocd
spec:
  defaultBackend:
    service:
      name: argocd-server
      port:
        name: https
  ingressClassName: tailscale
  tls:
    - hosts:
        - argocd
