apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: tailscale-operator
  targetNamespace: tailscale
  install:
    createNamespace: true
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.9
      sourceRef:
        kind: HelmRepository
        name: tailscale-operator
        namespace: flux-system
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s-operator
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    proxyConfig:
      defaultTags: tag:k8s
      image:
        repository: tailscale/tailscale
        tag: v1.98.9
    apiServerProxyConfig:
      mode: "false"
