apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: victorialogs-tailnet
  annotations:
    tailscale.com/tags: tag:k8s,tag:shared-victorialogs
spec:
  defaultBackend:
    service:
      name: victorialogs
      port:
        name: http
  ingressClassName: tailscale
  tls:
    - hosts:
        - victorialogs
