apiVersion: apps/v1
kind: Deployment
metadata:
  name: victorialogs
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: victorialogs
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: victorialogs
    spec:
      containers:
        - name: victorialogs
          image: victoriametrics/victoria-logs:v1.4.0-victorialogs
          args:
            - -storageDataPath=/storage
            - -retentionPeriod=7d
            - -httpListenAddr=:9428
          ports:
            - name: http
              containerPort: 9428
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victorialogs-storage
