apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-linode-webhook
  namespace: flux-system
spec:
  interval: 1h
  releaseName: cert-manager-webhook-linode
  targetNamespace: cert-manager
  install:
    createNamespace: true
  chart:
    spec:
      chart: deploy/cert-manager-webhook-linode
      sourceRef:
        kind: GitRepository
        name: cert-manager-linode-webhook
        namespace: flux-system
  values:
    api:
      groupName: acme.workrave.org
    certManager:
      namespace: cert-manager
      serviceAccountName: cert-manager
    deployment:
      secretName: linode-credentials
      secretKey: token
    image:
      tag: v0.4.1
