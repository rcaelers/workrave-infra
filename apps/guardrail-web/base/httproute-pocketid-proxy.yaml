apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guardrail-pocketid-proxy
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - auth.workrave.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /invite/auto-login
      backendRefs:
        - name: guardrail-web
          port: 80
