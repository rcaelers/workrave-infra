apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardrail-web
spec:
  template:
    spec:
      containers:
        - name: guardrail-web
          env:
            - name: GUARDRAIL_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootUser
            - name: GUARDRAIL_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootPassword
