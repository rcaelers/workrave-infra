apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: guardrail-web
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - crashes.workrave.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: guardrail-web
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: guardrail-ui
          port: 3000
