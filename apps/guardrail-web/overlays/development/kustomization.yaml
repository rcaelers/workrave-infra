apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guardrail-dev
resources:
  - ../../base
patches:
  - path: ingress-host-patch.json
    target:
      group: networking.k8s.io
      kind: Ingress
      name: guardrail-web
      version: v1
  - path: database-env-patch.yaml
images:
- name: ghcr.io/rcaelers/guardrail-server
  newTag: "1ea4be1"
