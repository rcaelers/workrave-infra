apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: guardrail

resources:
  - ../../base

patches:
  - path: ingress-host-patch.json
    target:
      group: gateway.networking.k8s.io
      version: v1
      kind: HTTPRoute
      name: guardrail-web
