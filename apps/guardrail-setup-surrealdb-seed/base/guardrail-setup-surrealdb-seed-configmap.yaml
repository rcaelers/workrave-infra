apiVersion: v1
kind: ConfigMap
metadata:
  name: guardrail-setup-surrealdb-seed-script
data:
  setup.sh: |
    #!/bin/sh
    set -eu

    SURREAL_URL="http://surrealdb:8000"
    SURREAL_NS="${DATABASE_NAMESPACE:-guardrail}"
    SURREAL_DB="${DATABASE_NAME:-guardrail}"

    log() { printf '%s\n' "$*"; }

    # Execute SurrealQL - reads SQL text from stdin, returns JSON
    # Fails if SurrealDB returns any statement with status ERR.
    surql() {
      if ! __r=$(curl -sS \
        -X POST "${SURREAL_URL}/sql" \
        -H "Accept: application/json" \
        -H "Content-Type: text/plain" \
        -H "Surreal-NS: ${SURREAL_NS}" \
        -H "Surreal-DB: ${SURREAL_DB}" \
        -u "${SURREAL_USER}:${SURREAL_PASS}" \
        --data-binary @-); then
        log "SurrealDB request failed" >&2
        return 1
      fi
      if printf '%s' "$__r" | jq -e 'if type == "object" and has("code") then true elif type == "array" then ([.[] | select(.status == "ERR")] | length > 0) else false end' >/dev/null 2>&1; then
        log "SurrealDB error: $(printf '%s' "$__r" | jq -r 'if type == "array" then [.[] | select(.status == "ERR") | (.detail // .result // tostring)] | join("; ") elif type == "object" then (.information // .description // .details // tostring) else tostring end' 2>/dev/null || printf '%s' "$__r")" >&2
        return 1
      fi
      printf '%s\n' "$__r"
    }

    # Wait for the schema rollout to create the tables this seed job uses.
    schema_ready() {
      for table in products users api_tokens user_access crashes crash_groups symbols annotations; do
        if ! printf "INFO FOR TABLE %s;" "$table" | surql >/dev/null 2>&1; then
          log "Waiting for SurrealDB schema table: ${table}"
          return 1
        fi
      done
    }

    log "Waiting for SurrealDB schema..."
    attempt=0
    until schema_ready; do
      attempt=$((attempt + 1))
      if [ "$attempt" -ge 60 ]; then
        log "SurrealDB schema was not imported in time"
        exit 1
      fi
      sleep 5
    done
    log "SurrealDB schema is ready"

    # Migrate any products or api_tokens whose SurrealDB record key was created with
    # u'UUID' (UUID-typed) to plain string keys.  Runs idempotently: if the
    # UUID-typed record is gone the IF block is skipped; if the string-typed record
    # already exists it is not recreated.
    for migrate_uuid in "$WORKRAVE_PRODUCT_ID" "$WORKRAVE_DEMO_PRODUCT_ID"; do
      printf "
        LET \$old = type::record('products', type::uuid('%s'));
        LET \$new = type::record('products', '%s');
        UPDATE user_access  SET product_id = \$new WHERE product_id = \$old;
        UPDATE crashes      SET product_id = \$new WHERE product_id = \$old;
        UPDATE crash_groups SET product_id = \$new WHERE product_id = \$old;
        UPDATE symbols      SET product_id = \$new WHERE product_id = \$old;
        UPDATE api_tokens   SET product_id = \$new WHERE product_id = \$old;
        UPDATE annotations  SET product_id = \$new WHERE product_id = \$old;
        DELETE \$old;
      " "$migrate_uuid" "$migrate_uuid" | surql
    done
    log "UUID-to-string key migration complete"

    # Backfill product_token for any products created before the field was required,
    # or where it was stored as a UUID type (from rand::uuid::v4()).
    printf "UPDATE products SET product_token = string::lowercase(rand::string(24)) WHERE !type::is_string(product_token);" | surql
    printf "UPDATE products SET product_token = string::lowercase(rand::string(24)) WHERE product_token = '';" | surql
    log "product_token backfill complete"

    # Create Workrave product if it doesn't exist; retrieve existing id otherwise
    EXISTING_ID=$(printf "SELECT meta::id(id) as id FROM products WHERE name = 'Workrave' LIMIT 1;" \
      | surql | jq -r '.[0].result[0].id // empty')

    if [ -z "$EXISTING_ID" ]; then
      printf "CREATE type::record('products', '%s') CONTENT {
        name: 'Workrave',
        slug: 'workrave',
        description: 'Workrave is a free program that assists in the recovery and prevention of Repetitive Strain Injury (RSI)',
        color: '#9333ea',
        public: true,
        accepting_crashes: true,
        product_token: string::lowercase(rand::string(24)),
        metadata: {},
        created_at: time::now(),
        updated_at: time::now()
      };" "$WORKRAVE_PRODUCT_ID" | surql
      log "Created Workrave product (id: ${WORKRAVE_PRODUCT_ID})"
    else
      log "Workrave product already exists (id: ${EXISTING_ID})"
    fi
  
    # ── Workrave Demo product ────────────────────────────────────────────
    # INSERT IGNORE creates the record only if it doesn't exist.
    # The subsequent UPDATE SET enforces public:true even on existing records.
    printf "INSERT IGNORE INTO products {
      id: type::record('products', '%s'),
      name: 'Workrave Demo',
      slug: 'workrave-demo',
      description: 'Demo Workrave data set',
      color: '#9333ea',
      public: true,
      accepting_crashes: true,
      product_token: string::lowercase(rand::string(24)),
      metadata: {},
      created_at: time::now(),
      updated_at: time::now()
    };" "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    printf "UPDATE type::record('products', '%s') SET
      public = true, accepting_crashes = true, updated_at = time::now();"\
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    log "Workrave Demo product ready (id: ${WORKRAVE_DEMO_PRODUCT_ID})"

    # Replace all existing Workrave Demo crash data with a compact Workrave-inspired
    # data set. This seed intentionally creates only crash_groups and crashes.
    printf "DELETE annotations WHERE product_id = type::record('products', '%s');" \
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    printf "DELETE crashes WHERE product_id = type::record('products', '%s');" \
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql
    printf "DELETE crash_groups WHERE product_id = type::record('products', '%s');" \
      "$WORKRAVE_DEMO_PRODUCT_ID" | surql

    demo_fingerprint() {
      printf "workrave.exe!%s|workrave.exe!Menus::init::<lambda9>::operator()() const|workrave.exe!std::__1::__function::__func<Menus::init::<lambda9>, std::__1::allocator<Menus::init::<lambda9>>, void ()>::operator()()|workrave.exe!menus::Node::activate()|workrave.exe!detail::ToolkitActionMenuEntry::activate()|libgiomm-2.4-1.dll!Gio::ActionGroup::activate_action_vfunc_callback|libgobject-2.0-0.dll!g_closure_invoke|libgobject-2.0-0.dll!signal_emit_unlocked_R|ucrtbase.dll!invoke_main" "$1"
    }

    seed_demo_group() {
      group_id="$1" top_frame="$2" source_file="$3" source_line="$4" count="$5" first_seen="$6" last_seen="$7" status="$8"
      fingerprint=$(demo_fingerprint "$top_frame")
      printf "INSERT INTO crash_groups {
        id: type::record('crash_groups', '%s'),
        product_id: type::record('products', '%s'),
        fingerprint: '%s',
        signal: 'EXCEPTION_ACCESS_VIOLATION_WRITE',
        count: %s,
        first_seen: d'%s',
        last_seen: d'%s',
        status: '%s',
        assignee: NONE,
        created_at: d'%s',
        updated_at: d'%s'
      };" \
        "$group_id" "$WORKRAVE_DEMO_PRODUCT_ID" "$fingerprint" \
        "$count" "$first_seen" "$last_seen" "$status" "$first_seen" "$last_seen" | surql
    }

    seed_demo_crash() {
      crash_id="$1" group_id="$2" top_frame="$3" source_file="$4" source_line="$5" version="$6" os_version="$7" created_at="$8" machine="$9"
      shift 9
      crash_index="$1"
      fingerprint=$(demo_fingerprint "$top_frame")
      module_code_id="67EA$(printf '%04X' "$crash_index")710000"
      thread_id=$((3000 + crash_index))
      printf "INSERT INTO crashes {
        id: type::record('crashes', '%s'),
        product_id: type::record('products', '%s'),
        group_id: type::record('crash_groups', '%s'),
        fingerprint: '%s',
        report: {
          product: 'Workrave Demo',
          version: '%s',
          timestamp: d'%s',
          machine: '%s',
          exceptionType: 'EXCEPTION_ACCESS_VIOLATION_WRITE',
          exceptionTypeShort: 'ACCESS_VIOLATION',
          signal: 'EXCEPTION_ACCESS_VIOLATION_WRITE',
          title: '%s',
          topFrame: '%s',
          platform: 'windows',
          build: 'windows-clang64',
          crash_info: {
            type: 'EXCEPTION_ACCESS_VIOLATION_WRITE',
            address: '0x0000000000000030',
            crashing_thread: 0
          },
          system_info: {
            os: 'Windows NT',
            os_ver: '%s',
            cpu_arch: 'amd64',
            cpu_count: 12
          },
          modules: [
            { filename: 'workrave.exe', version: '1.11.0.0', code_id: '%s', debug_file: 'workrave.pdb' },
            { filename: 'libgiomm-2.4-1.dll', version: '2.78.1.0', code_id: '652C8A9F2d0000', debug_file: 'libgiomm-2.4-1.pdb' },
            { filename: 'libgobject-2.0-0.dll', version: '2.78.1.0', code_id: '652C88B12b0000', debug_file: 'libgobject-2.0-0.pdb' },
            { filename: 'ucrtbase.dll', version: '10.0.26100.4202', code_id: '7C2C44FAf4000', debug_file: 'ucrtbase.pdb' }
          ],
          crashing_thread: {
            thread_id: %s,
            thread_name: 'main thread',
            frames: [
              { module: 'workrave.exe', function: '%s', source: '%s', line: %s },
              { module: 'workrave.exe', function: 'Menus::init::<lambda9>::operator()() const', source: 'C:/build/workrave/src/ui/app/Menus.cc', line: 135 },
              { module: 'workrave.exe', function: 'menus::Node::activate()', source: 'C:/build/workrave/src/ui/common/menus/Node.cc', line: 74 },
              { module: 'workrave.exe', function: 'detail::ToolkitActionMenuEntry::activate()', source: 'C:/build/workrave/src/libs/toolkit/gtkmm/ToolkitMenu.cc', line: 211 },
              { module: 'libgobject-2.0-0.dll', function: 'g_closure_invoke' },
              { module: 'ucrtbase.dll', function: 'invoke_main' }
            ]
          },
          threads: [
            { thread_id: %s, thread_name: 'main thread' },
            { thread_id: %s, thread_name: 'gtk event loop' }
          ],
          unloaded_modules: []
        },
        created_at: d'%s',
        updated_at: d'%s'
      };" \
        "$crash_id" "$WORKRAVE_DEMO_PRODUCT_ID" "$group_id" "$fingerprint" \
        "$version" "$created_at" "$machine" "$fingerprint" "$top_frame" \
        "$os_version" "$module_code_id" "$thread_id" "$top_frame" "$source_file" "$source_line" \
        "$thread_id" "$((thread_id + 1))" "$created_at" "$created_at" | surql
    }

    seed_demo_series() {
      group_id="$1" top_frame="$2" source_file="$3" source_line="$4" count="$5" first_seen="$6" last_seen="$7" status="$8" version="$9"
      shift 9
      os_version="$1"
      seed_demo_group "$group_id" "$top_frame" "$source_file" "$source_line" "$count" "$first_seen" "$last_seen" "$status"
      i=1
      while [ "$i" -le "$count" ]; do
        day=$(( (i * 3) % 24 + 1 ))
        hour=$(( (8 + i) % 18 ))
        minute=$(( (11 * i) % 60 ))
        created_at=$(printf '2026-05-%02dT%02d:%02d:00Z' "$day" "$hour" "$minute")
        seed_demo_crash "$(printf '%s-%03d' "$group_id" "$i")" "$group_id" "$top_frame" "$source_file" "$source_line" "$version" "$os_version" "$created_at" "demo-windows-$(( (i % 5) + 1 ))" "$i"
        i=$((i + 1))
      done
    }

    seed_demo_series "WRD-ABOUT-001" "Menus::on_menu_about()" "C:/build/workrave/src/ui/app/Menus.cc" 218 14 "2026-05-03T09:11:00Z" "2026-05-24T19:34:00Z" "new" "1.11.0-rc.4" "10.0.26200.8457"
    seed_demo_series "WRD-ABOUT-002" "Menus::init::<lambda9>::operator()() const" "C:/build/workrave/src/ui/app/Menus.cc" 135 11 "2026-05-04T10:22:00Z" "2026-05-23T18:12:00Z" "triaged" "1.11.0-rc.4" "10.0.26100.4061"
    seed_demo_series "WRD-MENU-003" "menus::Node::activate()" "C:/build/workrave/src/ui/common/menus/Node.cc" 74 9 "2026-05-06T08:43:00Z" "2026-05-22T17:05:00Z" "new" "1.11.0-rc.3" "10.0.22631.3593"
    seed_demo_series "WRD-TOOLKIT-004" "detail::ToolkitActionMenuEntry::activate()" "C:/build/workrave/src/libs/toolkit/gtkmm/ToolkitMenu.cc" 211 8 "2026-05-07T12:14:00Z" "2026-05-21T16:45:00Z" "triaged" "1.11.0-rc.3" "10.0.26200.8457"
    seed_demo_series "WRD-APPLET-005" "WorkraveApplet::on_menu_about()" "C:/build/workrave/src/ui/app/WorkraveApplet.cc" 302 7 "2026-05-08T11:02:00Z" "2026-05-20T15:17:00Z" "resolved" "1.10.52" "10.0.22631.3593"
    seed_demo_series "WRD-WINDOW-006" "MainWindow::show_about_dialog()" "C:/build/workrave/src/ui/app/MainWindow.cc" 487 7 "2026-05-09T09:39:00Z" "2026-05-24T14:02:00Z" "new" "1.11.0-dev" "10.0.26100.4061"
    seed_demo_series "WRD-GTK-007" 'GtkMenuBuilder::connect_actions()::$_3::operator()() const' "C:/build/workrave/src/ui/app/GtkMenuBuilder.cc" 156 6 "2026-05-10T13:01:00Z" "2026-05-23T13:47:00Z" "triaged" "1.11.0-dev" "10.0.26200.8457"
    seed_demo_series "WRD-SESSION-008" "Application::open_about_dialog()" "C:/build/workrave/src/ui/app/Application.cc" 622 6 "2026-05-11T14:27:00Z" "2026-05-22T12:22:00Z" "resolved" "1.10.52" "10.0.26100.4061"
    seed_demo_series "WRD-PREFS-009" "PreferencesDialog::on_help_about()" "C:/build/workrave/src/ui/pref/PreferencesDialog.cc" 344 5 "2026-05-12T15:41:00Z" "2026-05-21T11:04:00Z" "new" "1.11.0-rc.4" "10.0.22631.3593"
    seed_demo_series "WRD-TRAY-010" "TrayIcon::activate_about_action()" "C:/build/workrave/src/ui/app/TrayIcon.cc" 189 5 "2026-05-13T08:18:00Z" "2026-05-20T10:39:00Z" "triaged" "1.11.0-rc.3" "10.0.26200.8457"
    seed_demo_series "WRD-DBUS-011" "DBusMenuExporter::activate_action()" "C:/build/workrave/src/ui/app/DBusMenuExporter.cc" 91 4 "2026-05-14T16:08:00Z" "2026-05-19T09:25:00Z" "resolved" "1.11.0-dev" "10.0.22631.3593"
    seed_demo_series "WRD-CREDITS-012" "AboutDialog::populate_credits()" "C:/build/workrave/src/ui/app/AboutDialog.cc" 64 4 "2026-05-15T10:09:00Z" "2026-05-18T08:51:00Z" "new" "1.10.52" "10.0.26100.4061"

    log "Workrave Demo seeded: 12 crash groups, 86 crashes"

    log "Guardrail setup complete"
