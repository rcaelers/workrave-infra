apiVersion: batch/v1
kind: Job
metadata:
  name: guardrail-setup-surrealdb-schema-complete
  annotations:
    kustomize.toolkit.fluxcd.io/force: "Enabled"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: guardrail-setup-surrealdb-schema
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-rollout-complete
          image: ghcr.io/rcaelers/guardrail-schema-sync:placeholder
          command: ["sh", "/app/bin/surrealkit-rollout-complete.sh"]
          env:
            - name: DATABASE_HOST
              value: ws://surrealdb.surrealdb:8000
            - name: DATABASE_NAMESPACE
              value: guardrail
            - name: DATABASE_NAME
              value: guardrail
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootUser
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: rootPassword
