apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: guardrail-curator-network-policy
spec:
  podSelector:
    matchLabels:
      app: guardrail-curator
  policyTypes:
  - Ingress
  - Egress
  ingress:
  egress:
  - to:
    - podSelector:
        matchLabels:
          cnpg.io/cluster: guardrail-db
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: surrealdb
      podSelector:
        matchLabels:
          app.kubernetes.io/name: surrealdb
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: valkey
          app.kubernetes.io/instance: valkey
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: garage
      podSelector:
        matchLabels:
          app.kubernetes.io/name: garage
          app.kubernetes.io/instance: garage
    ports:
    - protocol: TCP
      port: 3900
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
