apiVersion: batch/v1
kind: Job
metadata:
  name: guardrail-auth-setup
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: guardrail-auth-setup
      containers:
        - name: setup
          image: alpine:3
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache curl jq >/dev/null 2>&1 && /bin/sh /scripts/setup.sh
          envFrom:
            - configMapRef:
                name: guardrail-auth-config
          env:
            - name: POCKET_ID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pocket-id-secrets
                  key: STATIC_API_KEY
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: guardrail-auth-setup-script
            defaultMode: 0755
