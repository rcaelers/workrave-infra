apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: guardrail
resources:
  - ../../base
  - garage-secrets.yaml
  - tailnet-ingress.yaml
helmGlobals:
  chartHome: ../../base/charts
helmCharts:
  - name: garage
    releaseName: garage
    namespace: guardrail
    valuesFile: values.yaml
patches:
  - target:
      kind: StatefulSet
      name: garage
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers/0
        value:
          name: prepare-local-storage
          image: busybox:stable
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /mnt/meta /mnt/data
              chown -R 1000:1000 /mnt/meta /mnt/data
              chmod 700 /mnt/meta /mnt/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          volumeMounts:
            - name: meta
              mountPath: /mnt/meta
            - name: data
              mountPath: /mnt/data
  - target:
      kind: Service
      name: garage
    patch: |-
      - op: add
        path: /spec/publishNotReadyAddresses
        value: true
      - op: add
        path: /spec/ports/-
        value:
          name: admin
          port: 3903
          targetPort: 3903
          protocol: TCP
