apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
spec:
  replicas: 1
  serviceName: garage-headless
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: prepare-secrets
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              for file in /garage-secret-src/*; do
                target="/garage-secrets-private/$(basename "$file")"
                cp "$file" "$target"
                chmod 0600 "$target"
              done
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: secrets
              mountPath: /garage-secret-src
              readOnly: true
            - name: private-secrets
              mountPath: /garage-secrets-private
      containers:
        - name: garage
          image: dxflrs/amd64_garage:v2.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: s3
              containerPort: 3900
              protocol: TCP
            - name: rpc
              containerPort: 3901
              protocol: TCP
            - name: web
              containerPort: 3902
              protocol: TCP
            - name: admin
              containerPort: 3903
              protocol: TCP
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 384Mi
              cpu: 200m
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
              readOnly: true
            - name: secrets
              mountPath: /etc/garage/secrets
              readOnly: true
            - name: storage
              mountPath: /var/lib/garage
      volumes:
        - name: config
          configMap:
            name: garage-config
        - name: secrets
          secret:
            secretName: garage-secrets
            defaultMode: 0440
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
